# set-option -sa terminal-overrides ",xterm*:Tc"
set -g mouse on
# set-option -g default-shell /usr/local/bin/fish
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Vim style pane selection
bind h select-pane -L
bind j select-pane -D 
bind k select-pane -U
bind l select-pane -R

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Use Alt-arrow keys without prefix key to switch panes
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Shift arrow to switch windows
bind -n S-Left  previous-window
bind -n S-Right next-window

# Shift Alt vim keys to switch windows
bind -n M-H previous-window
bind -n M-L next-window

# set -g @catppuccin_flavour 'mocha'

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
# set -g @plugin 'dreamsofcode-io/catppuccin-tmux'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'omerxx/tmux-floax'

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:Tc"
set -g allow-passthrough on
# tmux-floax defaults to `<prefix>+p`, but set it explicitly so the Ghostty
# Command-key bridge stays obvious and easy to change later.
set -g @floax-bind 'p'
set -g @floax-bind-menu 'P'
# Use a dedicated FloaX scratch session per tmux session instead of one global
# scratch workspace shared across every session.
set -g @floax-session-prefix '__floax__'

set -g @resurrect-save 'C-s'
set -g @resurrect-restore 'C-r'



# set -g status-fg white
# set -g status-bg black

set -g status-style bg=default
run '~/.tmux/plugins/tpm/tpm'

# Override the plugin's default global scratch session with a per-session wrapper.
bind-key p run-shell "$HOME/.config/tmux/scripts/floax-session.sh toggle"
bind-key P run-shell "$HOME/.config/tmux/scripts/floax-session.sh menu"
# When a main session is closed, also close its dedicated FloaX session.
set-hook -g session-closed 'run-shell "$HOME/.config/tmux/scripts/floax-cleanup.sh \"#{hook_session_name}\""'

# set vi-mode
set-window-option -g mode-keys vi
# keybindings
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

run-shell ~/.config/tmux/plugins/tmux-resurrect/resurrect.tmux


# Ghostty's macOS Command-key bridge sends tmux prefix sequences into this config.
# Relevant pairs right now:
# - Command-K -> prefix + T -> sesh session picker
# - Command-P -> prefix + p -> tmux-floax toggle
# bind-key "T" display-popup -E -w 80% -h 70% -d '#{pane_current_path}' -T 'Sesh' tv sesh
bind-key "T" run-shell "$HOME/.config/tmux/scripts/sesh-connect.sh"
